# Paper-ready TextVQA protocol robustness matrix
# 1 dataset x 4 models x 3 prompt variants x 2 temperatures = 24 runs
output_root: outputs/textvqa_paper_robustness
seed: 7
evaluation_n_bins: 10
prompt_system_text: "You are a careful visual question answering assistant. Follow output instructions exactly."

# Device-compatible temperatures (must be > 0)
temperatures:
  - 0.2
  - 0.6

prompt_variants:
  - name: structured
    mode: structured
  - name: free_text
    mode: free_text
  - name: free_text_tagged
    mode: free_text_tagged

datasets:
  - name: TextVQA
    mode: textvqa
    data_root: data
    # Replace with your prepared TextVQA validation source list.
    source_path: /home/featurize/data/textvqa/textvqa_val_source.json
    num_pairs: -1
    image_size: 224
    evidence_removal: mask

models:
  - name: Qwen2.5-VL-7B
    adapter: hf
    model_name: Qwen/Qwen2.5-VL-7B-Instruct
    device: cuda
    vram_gb: 24
    max_new_tokens: 64
    generation_kwargs:
      top_p: 1.0
  - name: Qwen2.5-VL-3B
    adapter: hf
    model_name: Qwen/Qwen2.5-VL-3B-Instruct
    device: cuda
    vram_gb: 24
    max_new_tokens: 64
    generation_kwargs:
      top_p: 1.0
  - name: InternVL2.5-8B
    adapter: hf
    model_name: OpenGVLab/InternVL2_5-8B
    device: cuda
    vram_gb: 24
    max_new_tokens: 64
    generation_kwargs:
      top_p: 1.0
  - name: LLaVA-OneVision-0.5B
    adapter: hf
    model_name: llava-hf/llava-onevision-qwen2-0.5b-ov-hf
    device: cuda
    vram_gb: 24
    max_new_tokens: 64
    generation_kwargs:
      top_p: 1.0
