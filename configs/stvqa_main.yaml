# ST-VQA main follow-up matrix.
output_root: outputs/stvqa_main
seed: 7
evaluation_n_bins: 10
prompt_system_text: "You are a careful visual question answering assistant. Follow output instructions exactly."

prompt_modes:
  - structured

datasets:
  - name: ST-VQA
    mode: stvqa
    data_root: data
    source_path: /home/featurize/data/stvqa/stvqa_test_source.json
    num_pairs: -1
    image_size: 224
    evidence_removal: mask

models:
  - name: Qwen2.5-VL-7B
    adapter: hf
    model_name: Qwen/Qwen2.5-VL-7B-Instruct
    device: cuda
    vram_gb: 24
    max_new_tokens: 64
    generation_kwargs:
      temperature: 0.2
      top_p: 1.0
  - name: InternVL2.5-8B
    adapter: hf
    model_name: OpenGVLab/InternVL2_5-8B
    device: cuda
    vram_gb: 24
    max_new_tokens: 64
    generation_kwargs:
      temperature: 0.2
      top_p: 1.0
  - name: Idefics3-8B-Llama3
    adapter: hf
    model_name: HuggingFaceM4/Idefics3-8B-Llama3
    device: cuda
    vram_gb: 24
    max_new_tokens: 64
    generation_kwargs:
      temperature: 0.2
      top_p: 1.0
