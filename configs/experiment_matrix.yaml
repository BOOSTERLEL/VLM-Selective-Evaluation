# Frozen stage-1 matrix template: 2 datasets x 4 models x 2 prompt modes = 16 runs.
# Replace source_path with your prepared filtered source JSON list when available.
output_root: outputs/stage1_frozen_matrix
seed: 7
evaluation_n_bins: 10
prompt_system_text: "You are a careful visual question answering assistant. Follow output instructions exactly."

prompt_modes:
  - structured
  - free_text

datasets:
  - name: TextVQA
    mode: textvqa
    data_root: data
    source_path: /home/featurize/data/textvqa/textvqa_val_source.json
    num_pairs: -1
    image_size: 224
    evidence_removal: mask
  - name: GQA
    mode: gqa
    data_root: data
    source_path: /home/featurize/data/gqa/gqa_val_source.json
    num_pairs: 2000
    image_size: 224
    evidence_removal: mask

models:
  - name: Qwen2.5-VL-7B
    adapter: hf
    model_name: Qwen/Qwen2.5-VL-7B-Instruct
    device: cuda
    vram_gb: 24
    max_new_tokens: 64
    generation_kwargs:
      temperature: 1.0
      top_p: 1.0
  - name: Qwen2.5-VL-3B
    adapter: hf
    model_name: Qwen/Qwen2.5-VL-3B-Instruct
    device: cuda
    vram_gb: 24
    max_new_tokens: 64
    generation_kwargs:
      temperature: 1.0
      top_p: 1.0
  - name: InternVL2.5-8B
    adapter: hf
    model_name: OpenGVLab/InternVL2_5-8B
    device: cuda
    vram_gb: 24
    max_new_tokens: 64
    generation_kwargs:
      temperature: 1.0
      top_p: 1.0
  - name: LLaVA-OneVision-0.5B
    adapter: hf
    model_name: llava-hf/llava-onevision-qwen2-0.5b-ov-hf
    device: cuda
    vram_gb: 24
    max_new_tokens: 64
    generation_kwargs:
      temperature: 1.0
      top_p: 1.0
